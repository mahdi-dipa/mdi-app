<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>درب مخفی | MDI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="scene">
    <div class="door-card">
      <p class="eyebrow">MDI · مرکز فرماندهی دیجیتال</p>
      <h1>درب مخفی</h1>
      <p class="sub">فقط برای کسی که کلیدش رو داره.</p>

      <form id="loginForm">
        <div class="field">
          <label for="username">نام کاربری</label>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">رمز عبور</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <p class="error" id="errorMsg" hidden></p>
        <button type="submit" id="submitBtn">ورود به قصر</button>
      </form>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
